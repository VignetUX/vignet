<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Workshop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, sans-serif; background: #111; color: #e0e0e0; }

    #app { display: flex; height: 100%; }

    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #sidebar h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      padding: 16px 14px 10px;
      border-bottom: 1px solid #2a2a2a;
    }

    .file-group { padding: 8px 0; }

    .file-label {
      font-size: 11px;
      color: #666;
      padding: 4px 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .test-item {
      display: block;
      padding: 7px 14px 7px 20px;
      font-size: 13px;
      color: #bbb;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .test-item:hover { background: #222; color: #fff; }
    .test-item.active { background: #1e3a5f; color: #7bbfff; }

    #frame-container { flex: 1; overflow: hidden; background: #fff; }
    #workshop-frame { width: 100%; height: 100%; border: none; }

    #sidebar-empty { padding: 16px 14px; font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <h1>Workshop</h1>
      <div id="sidebar-content"><p id="sidebar-empty">Loading…</p></div>
    </nav>
    <div id="frame-container">
      <iframe id="workshop-frame" title="Component preview"></iframe>
    </div>
  </div>
  <script type="module" src="/src/ui.ts"></script>
</body>
</html>
